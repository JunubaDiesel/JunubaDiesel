name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ci-placeholder
          ADMIN_PASSWORD: ci-admin

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ci-placeholder
          ADMIN_PASSWORD: ci-admin

      - run: npm run test:e2e
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ci-placeholder
          ADMIN_PASSWORD: ci-admin
